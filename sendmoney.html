<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar dinero</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- BOOTSTRAP JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- ESTILOS PROPIOS -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- JS PROPIO -->
    <script defer src="./assets/js/sendmoney.js"></script>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="./index.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Deposito</a>
                    <a class="nav-link active" aria-current="page" href="./sendmoney.html">Enviar Dinero</a>
                    <a class="nav-link" href="./transactions.html">Transacciones</a>
                    <a class="nav-link" href="./login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>


    <!-- ENCABEZADO -->
    <header class="py-5">
        <h1 class="text-primary text-capitalize text-center">Realiza tus Transferencias de Forma Segura</h1>
    </header>

    <main class="container">

        <section>

            <div class="row justify-content-center">
                <div class="col-12 col-sm-9 col-lg-7">
                    <h2>Balance de cuenta $ <span id="balance">0</span></h2>
                    <form id="formSendMoney">
                        <div class="mb-3">
                            <label for="buscarContacto" class="form-label">Buscar en la agenda de
                                transferencias:</label>
                            <input type="text" class="form-control" placeholder="Ingresa nombre contacto..." name="buscarContacto" id="buscarContacto">
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary">Agregar nuevo contacto</button>
                        </div>

                        <div>
                            <h2>Contactos registrados</h2>

                            <div class="mb-3">
                                <ul class="list-group" id="listaContactos">
                                    <!-- AQUÍ SE CARGAR LOS LI CON LOS DATOS DE LOS CONTACTOS -->
                                </ul>

                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto a transferir:</label>
                            <input type="number" class="form-control" min="500" name="monto" id="monto" placeholder="Monto minimo: 500">
                        </div>

                        <div class="mb-3">
                            <input type="submit" class="btn btn-primary" value="Enviar dinero">
                        </div>

                    </form>

                </div>
            </div>

        </section>

    </main>


</body>

</html>
