<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- BOOTSTRAP JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CSS INTERNO -->

    <link rel="stylesheet" href="./assets/css/style.css">


    <script defer src="./assets/js/login.js"></script>

</head>

<body>


    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="./index.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Deposito</a>
                    <a class="nav-link" href="./sendmoney.html">Enviar Dinero</a>
                    <a class="nav-link" href="./transactions.html">Transacciones</a>
                    <a class="nav-link active" aria-current="page" href="./login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-5 mt-5">
        <h1 class="text-center text-primary">Login de Usuario</h1>
    </header>

    <main class="container">

        <section class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <form id="formLogin">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" class="form-control" name="email" id="email" placeholder="Introduce tu email aquí..." required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Ingresa tu password:</label>
                        <input type="password" class="form-control" name="password" id="password" placeholder="Introduce tu password aquí..." required>
                    </div>

                    <div>
                        <input type="submit" value="Iniciar sesión" class="btn btn-primary">
                    </div>

                </form>
            </div>
        </section>

    </main>

</body>

</html>
